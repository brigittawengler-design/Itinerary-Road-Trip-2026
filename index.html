    const GH_API   = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

    function lsGet(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } }
    function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

    async function ghRead() {
      const r = await fetch(GH_API + "?t=" + Date.now(), { headers: { Accept: "application/vnd.github+json" } });
      if (!r.ok) return null;
      const j = await r.json();
      const text = atob(j.content.replace(/\n/g, ""));
      return { data: JSON.parse(text), sha: j.sha };
    }

    async function ghWrite(token, sha, data) {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
      const body = { message: "Trip data update", content, ...(sha ? { sha } : {}) };
      const r = await fetch(GH_API, {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json", Accept: "application/vnd.github+json" },
        body: JSON.stringify(body),
      });
      if (!r.ok) { const e = await r.json(); throw new Error(e.message || r.status); }
      const j = await r.json();
      return j.content.sha;
    }

    // ── Token setup modal ─────────────────────────────────────────────────────
    function TokenModal({ onSave }) {
      const [val, setVal] = useState("");
      const [err, setErr] = useState("");
      const [testing, setTesting] = useState(false);

      async function test() {
        if (!val.trim()) return;
        setTesting(true); setErr("");
        try {
          const r = await fetch(GH_API, { headers: { Authorization: `Bearer ${val.trim()}`, Accept: "application/vnd.github+json" } });
          if (r.status === 404 || r.ok) { onSave(val.trim()); }
          else if (r.status === 401) { setErr("Token not recognized — check it and try again."); }
          else { setErr(`GitHub returned ${r.status}`); }
        } catch { setErr("Network error — are you online?"); }
        setTesting(false);
      }

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:999, padding:20 }}>

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("calendar");
      const [purchases, setPurchases] = useState([]);
      const [preTasks, setPreTasks] = useState(DEFAULT_PRE_TASKS);
      const [postTasks, setPostTasks] = useState(DEFAULT_POST_TASKS);
      const [loaded, setLoaded] = useState(false);
      const [syncStatus, setSyncStatus] = useState("idle");
      const [showTokenModal, setShowTokenModal] = useState(false);
      const shaRef = useRef(null);
      const tokenRef = useRef(lsGet("wrt_token"));
      const saveTimer = useRef(null);

      useEffect(() => {
        (async () => {
          const token = lsGet("wrt_token");
          if (!token) {
            // Read-only from GitHub (public repo), no token needed for reads
            const remote = await ghRead().catch(() => null);
            if (remote) {
              shaRef.current = remote.sha;
              applyData(remote.data);
            } else {
              // Fall back to localStorage
              const lp = lsGet("wrt_purchases"); const lpr = lsGet("wrt_pretasks"); const lpo = lsGet("wrt_posttasks");
              if (lp) setPurchases(lp); if (lpr) setPreTasks(lpr); if (lpo) setPostTasks(lpo);
            }
            setSyncStatus("notoken");
          } else {
            tokenRef.current = token;
            const remote = await ghRead().catch(() => null);
            if (remote) { shaRef.current = remote.sha; applyData(remote.data); }
            else { const lp = lsGet("wrt_purchases"); if (lp) setPurchases(lp); }
            setSyncStatus("idle");
          }
          setLoaded(true);
        })();
      }, []);

      function applyData(d) {
        if (d.purchases) setPurchases(d.purchases);
        if (d.preTasks)  setPreTasks(d.preTasks);
        if (d.postTasks) setPostTasks(d.postTasks);
      }

      function scheduleSave(data) {
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => persistSave(data), 1500);
      }

      async function persistSave(data) {
        lsSet("wrt_purchases", data.purchases);
        lsSet("wrt_pretasks",  data.preTasks);
        lsSet("wrt_posttasks", data.postTasks);
        const token = tokenRef.current;
        if (!token) { setSyncStatus("notoken"); return; }
        setSyncStatus("saving");
        try {
          shaRef.current = await ghWrite(token, shaRef.current, data);
          setSyncStatus("idle");
        } catch(e) {
          console.error(e);
          setSyncStatus("error");
        }
      }

      const saveAll = useCallback((updates) => {
        const next = { purchases: updates.purchases ?? purchases, preTasks: updates.preTasks ?? preTasks, postTasks: updates.postTasks ?? postTasks };
        if (updates.purchases !== undefined) setPurchases(updates.purchases);
        if (updates.preTasks  !== undefined) setPreTasks(updates.preTasks);
        if (updates.postTasks !== undefined) setPostTasks(updates.postTasks);
        scheduleSave(next);
      }, [purchases, preTasks, postTasks]);

      function handleTokenSave(token) {
        setShowTokenModal(false);
        if (token) {
          lsSet("wrt_token", token);
          tokenRef.current = token;
          persistSave({ purchases, preTasks, postTasks });
        }
      }

      if (!loaded) return <div style={{ padding:32, color:C.textSecondary, fontFamily:"'Bitter',serif" }}>Loading your trip…</div>;

      return (
        <div style={S.app}>
          {showTokenModal && <TokenModal onSave={handleTokenSave} />}
          <div style={S.header}>
            <div style={{ padding:"0 4px" }}>
              <div style={S.headerTitle}>🚗 Wengler Road Trip 2026</div>
              <div style={S.headerSub}>June 17–28 · San Tan Valley → NV → OR → CA → Home</div>
            </div>
            <div style={S.nav}>
              {[["calendar","📅 June"],["itinerary","🗺 Itinerary"],["hotels","🏨 Hotels & Car"],["budget","💰 Budget"],["tasks","✅ Tasks"]].map(([id,label]) => (
                <button key={id} style={S.navBtn(tab===id)} onClick={() => setTab(id)}>{label}</button>
              ))}
            </div>
          </div>
          <SyncBar status={syncStatus} onSetupToken={() => setShowTokenModal(true)} />
          <div style={S.body}>
            {tab === "calendar"  && <CalendarTab purchases={purchases} preTasks={preTasks} postTasks={postTasks} />}
            {tab === "itinerary" && <ItineraryTab purchases={purchases} />}
            {tab === "hotels"    && <HotelsTab />}
            {tab === "budget"    && <BudgetTab purchases={purchases} onSave={p => saveAll({ purchases:p })} />}
            {tab === "tasks"     && <TasksTab preTasks={preTasks} postTasks={postTasks} onSavePre={t => saveAll({ preTasks:t })} onSavePost={t => saveAll({ postTasks:t })} />}
          </div>
        </div>
      );
    }

    // ── Calendar ──────────────────────────────────────────────────────────────

      const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const firstDay = new Date(2026,5,1).getDay();

      function dayType(d) {
        if (d >= 8 && d <= 15) return "pre";
        if (d >= 16 && d <= 28) return "trip";
        if (d >= 29) return "post";
        return "normal";
      }

      function renderDetail() {
        if (!selected) return null;
        const d = selected;
        if (d >= 17 && d <= 28) {

              <div style={{ fontWeight:700, fontSize:13, marginBottom:6, fontFamily:"'Playfair Display',serif" }}>Day {d-16} — {td.date}: {td.title}</div>

            </div>
          );
        }
        if (d === 16) return (
          <div style={S.detailBox}>
            <div style={{ fontWeight:700, fontSize:13, marginBottom:6 }}>Jun 16 — Car pickup</div>
            <div style={S.stopRow}>
              <span style={S.stopTime}>5:30 PM</span>
              <div><div style={S.stopName}>Pick up rental car — Budget Rent a Car</div><div style={S.stopNote}>Mesa Gateway Airport (AZA) · 6033 S Sossaman Rd, Mesa, AZ · Conf: 40636914US3 · Bring Visa 7796 + driver's license</div></div>
            </div>
          </div>
        );
        if (d === 30) return (
          <div style={{ ...S.detailBox, background:"#fff3cd" }}>
            <div style={{ fontWeight:700, fontSize:13, marginBottom:6, color:C.warning }}>Jun 30 — Car return DEADLINE ⚠</div>

              <span style={S.stopTime}>5:30 PM</span>

            <div style={{ fontWeight:700, fontSize:13, marginBottom:6 }}>Jun {d} — Tasks due</div>
            {dayTasks.map((t,i) => <div key={i} style={{ fontSize:13, padding:"4px 0", color: t.urgent?C.warning:C.textPrimary }}>{t.urgent ? "⚠ " : ""}{t.text}</div>)}
          </div>
        );
        return null;
      }

      return (
        <div style={S.section}>
          <div style={{ display:"flex", gap:12, marginBottom:10, fontSize:11, flexWrap:"wrap", alignItems:"center" }}>
            <span><span style={{ display:"inline-block", width:10, height:10, background:C.sky, border:`0.5px solid ${C.skyBorder}`, borderRadius:2, marginRight:4 }}></span>Pre-trip</span>
            <span><span style={{ display:"inline-block", width:10, height:10, background:C.sage, border:`0.5px solid ${C.sageBorder}`, borderRadius:2, marginRight:4 }}></span>Trip days</span>
            <span><span style={{ display:"inline-block", width:10, height:10, background:C.amber, border:`0.5px solid ${C.amberBorder}`, borderRadius:2, marginRight:4 }}></span>Post-trip</span>
            <span style={S.muted}>Tap a day for details</span>
          </div>
          <div style={S.calGrid}>
            {days.map(d => <div key={d} style={S.calHdr}>{d}</div>)}
            {Array.from({length:firstDay}).map((_,i) => (
              <div key={`pre-${i}`} style={S.calDay("om", false)}>
                <div style={S.calDayNum}>{31 - firstDay + i + 1}</div>
              </div>
            ))}
            {Array.from({length:30}).map((_,i) => {
              const d = i + 1;
              const type = dayType(d);
              const isToday = d === 8;
              const dayTasks = allTasks.filter(t => t.due && t.due.startsWith(`Jun ${d}`));
              return (
                <div key={d} style={S.calDay(type, isToday)} onClick={() => setSelected(selected===d ? null : d)}>
                  <div style={{ ...S.calDayNum, color: isToday ? C.accent : C.textSecondary }}>{d}</div>
                  {d === 16 && <span style={S.pill("car")}>Car pickup</span>}
                  {d === 30 && <span style={S.pill("warn")}>Car return</span>}
                  {d >= 17 && d <= 28 && <span style={S.pill("trip")}>Day {d-16}: {TRIP_DAYS[d-17]?.short}</span>}
                  {HOTEL_NIGHTS[d] && <span style={S.pill("hotel")}>{HOTEL_NIGHTS[d]}</span>}
                  {dayTasks.slice(0,1).map((t,ti) => <span key={ti} style={S.pill(t.urgent?"warn":"blue")}>{t.text.substring(0,16)}</span>)}

            {Array.from({length: 42 - firstDay - 30}).map((_,i) => (
              <div key={`post-${i}`} style={S.calDay("om", false)}>
                <div style={S.calDayNum}>{i+1}</div>
              </div>

          </div>
          {renderDetail()}
        </div>
      );
    }

    // ── Budget ────────────────────────────────────────────────────────────────
    function BudgetTab({ purchases, onSave }) {
      const [showForm, setShowForm] = useState(false);
      const [pCat, setPCat] = useState("meals");
      const [pAmt, setPAmt] = useState("");
      const [pDesc, setPDesc] = useState("");
      const [pDay, setPDay] = useState("");

      const spent = {};
      BUDGET_CATS.forEach(c => spent[c.key] = 0);
      purchases.forEach(p => { if (spent[p.cat] !== undefined) spent[p.cat] += parseFloat(p.amt||0); });
      const totalBudget = 3423;
      const totalSpent = Object.values(spent).reduce((a,b) => a+b, 0);
      const totalRem = totalBudget - totalSpent;

      function addPurchase() {
        if (!pAmt || parseFloat(pAmt) <= 0) return;
        const newP = { day:pDay, cat:pCat, amt:parseFloat(pAmt).toFixed(2), desc:pDesc, ts:new Date().toLocaleString() };
        onSave([...purchases, newP]);
        setPAmt(""); setPDesc(""); setShowForm(false);
      }

      function del(i) { const next = [...purchases]; next.splice(i,1); onSave(next); }

      return (
        <div style={S.section}>
          <div style={S.metricGrid}>
            <div style={S.metric}><div style={S.metricLabel}>Total budget</div><div style={S.metricVal}>${totalBudget.toLocaleString()}</div></div>
            <div style={S.metric}><div style={S.metricLabel}>Spent so far</div><div style={{ ...S.metricVal, color: totalSpent > totalBudget ? C.danger : C.textPrimary }}>${totalSpent.toFixed(2)}</div></div>
            <div style={S.metric}><div style={S.metricLabel}>Remaining</div><div style={{ ...S.metricVal, color: totalRem < 0 ? C.danger : C.success }}>${totalRem.toFixed(2)}</div></div>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div style={{ fontSize:15, fontWeight:700, fontFamily:"'Playfair Display',serif" }}>By category</div>
            <button style={S.btnPrimary} onClick={() => setShowForm(!showForm)}>+ Log purchase</button>
          </div>
          {showForm && (
            <div style={{ background:"#f8f9fa", borderRadius:8, padding:12, marginBottom:12 }}>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                <div style={{ flex:1, minWidth:110 }}>
                  <label style={S.label}>Category</label>
                  <select style={S.select} value={pCat} onChange={e => setPCat(e.target.value)}>
                    {BUDGET_CATS.map(c => <option key={c.key} value={c.key}>{c.label}</option>)}
                  </select>
                </div>
                <div style={{ width:85 }}>
                  <label style={S.label}>Amount ($)</label>
                  <input style={S.input} type="number" placeholder="0.00" value={pAmt} onChange={e => setPAmt(e.target.value)} min="0" step="0.01" />
                </div>
                <div style={{ flex:2, minWidth:130 }}>
                  <label style={S.label}>Description</label>
                  <input style={S.input} type="text" placeholder="e.g. Subway lunch" value={pDesc} onChange={e => setPDesc(e.target.value)} />
                </div>
                <div style={{ width:72 }}>
                  <label style={S.label}>Day</label>
                  <select style={S.select} value={pDay} onChange={e => setPDay(e.target.value)}>
                    <option value="">—</option>
                    <option value="Pre">Pre</option>
                    {TRIP_DAYS.map(t => <option key={t.day} value={t.day}>Day {t.day}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ marginTop:10, display:"flex", gap:8 }}>
                <button style={S.btnPrimary} onClick={addPurchase}>Add</button>
                <button style={S.btn} onClick={() => setShowForm(false)}>Cancel</button>
              </div>
            </div>
          )}
          <div style={S.card}>
            {BUDGET_CATS.map(c => {
              const s = spent[c.key]||0, b = c.budget, pct=(s/b)*100, over=s>b;
              return (
                <div key={c.key} style={S.budgetRow}>
                  <div style={{ minWidth:72, fontSize:13 }}>{c.label}</div>
                  <div style={S.progressWrap}><div style={S.progressFill(pct,over)} /></div>
                  <div style={{ textAlign:"right", minWidth:95 }}>
                    <div style={{ fontSize:13, fontWeight:600, color: over?C.danger:C.textPrimary }}>${s.toFixed(2)} / ${b}</div>
                    <div style={{ fontSize:11, color: over?C.danger:C.textSecondary }}>${(b-s).toFixed(2)} {over?"over":"left"}</div>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ marginTop:12, fontSize:15, fontWeight:700, marginBottom:8, fontFamily:"'Playfair Display',serif" }}>Recent purchases</div>
          <div style={S.card}>
            {purchases.length === 0
              ? <div style={S.muted}>No purchases yet. Tap "Log purchase" to start tracking.</div>
              : [...purchases].reverse().map((p,ri) => {
                  const i = purchases.length-1-ri;
                  const bc = BUDGET_CATS.find(c => c.key===p.cat);
                  return (
                    <div key={i} style={{ ...S.pRow, ...(ri===purchases.length-1?{borderBottom:"none"}:{}) }}>
                      <span style={{ ...S.muted, minWidth:38 }}>{p.day?`Day ${p.day}`:""}</span>
                      <span style={{ flex:1, margin:"0 8px" }}>{p.desc||"—"} <span style={S.muted}>{bc?.label}</span></span>
                      <span style={{ fontWeight:700 }}>${parseFloat(p.amt).toFixed(2)}</span>
                      <button style={S.delBtn} onClick={() => del(i)}>×</button>
                    </div>
                  );
                })
            }
          </div>
        </div>
      );
    }

    // ── Tasks ─────────────────────────────────────────────────────────────────
    function TasksTab({ preTasks, postTasks, onSavePre, onSavePost }) {
      const [activeTab, setActiveTab] = useState("pre");
      const [newText, setNewText] = useState("");
      const [newDue, setNewDue] = useState("");

      const tasks = activeTab==="pre" ? preTasks : postTasks;
      const onSave = activeTab==="pre" ? onSavePre : onSavePost;
      const done = tasks.filter(t => t.done).length;

      function toggle(i) { onSave(tasks.map((t,idx) => idx===i ? {...t,done:!t.done} : t)); }
      function del(i) { onSave(tasks.filter((_,idx) => idx!==i)); }
      function add() {
        if (!newText.trim()) return;
        onSave([...tasks, { id:"u"+Date.now(), text:newText.trim(), due:newDue.trim(), done:false, fixed:false }]);
        setNewText(""); setNewDue("");
      }

      return (
        <div style={S.section}>
          <div style={{ display:"flex", gap:8, marginBottom:12 }}>
            {[["pre","📋 Pre-trip"],["post","🏠 Post-trip"]].map(([id,label]) => (
              <button key={id} onClick={() => setActiveTab(id)}
                style={{ ...S.btn, borderColor: activeTab===id?C.accent:C.borderStrong, fontWeight: activeTab===id?700:400, color: activeTab===id?C.accent:C.textPrimary }}>
                {label}
              </button>
            ))}
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div style={{ fontSize:15, fontWeight:700, fontFamily:"'Playfair Display',serif" }}>{activeTab==="pre"?"Pre-trip tasks":"Post-trip tasks"}</div>
            <span style={S.muted}>{done}/{tasks.length} complete</span>
          </div>
          <div style={S.card}>
            {tasks.map((t,i) => (
              <div key={t.id} style={{ ...S.taskRow, ...(i===tasks.length-1?{borderBottom:"none"}:{}) }}>
                <input type="checkbox" checked={t.done} onChange={() => toggle(i)} style={{ marginTop:2, width:14, height:14, cursor:"pointer", flexShrink:0 }} />
                <label style={S.taskLabel(t.done)} onClick={() => toggle(i)}>{t.text}</label>
                {t.due && <span style={S.taskDue(t.urgent)}>{t.due}</span>}
                {!t.fixed && <button style={S.delBtn} onClick={() => del(i)}>×</button>}
              </div>
            ))}
          </div>
          <div style={{ background:"#f8f9fa", borderRadius:8, padding:12, marginTop:10 }}>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <div style={{ flex:2, minWidth:160 }}>
                <label style={S.label}>New task</label>
                <input style={S.input} type="text" placeholder="Task description..." value={newText} onChange={e => setNewText(e.target.value)} onKeyDown={e => e.key==="Enter" && add()} />
              </div>
              <div style={{ width:130 }}>
                <label style={S.label}>Due date (optional)</label>
                <input style={S.input} type="text" placeholder="e.g. Jun 15" value={newDue} onChange={e => setNewDue(e.target.value)} />
              </div>
            </div>
            <div style={{ marginTop:8 }}>
              <button style={S.btnPrimary} onClick={add}>+ Add task</button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
